# vsftpd.conf — CTF "UnB Comprometida"
# FTP anônimo somente leitura

listen=YES
listen_ipv6=NO

# Acesso anônimo habilitado, sem usuários locais
anonymous_enable=YES
local_enable=NO
write_enable=NO

# Diretório raiz do FTP anônimo
anon_root=/var/ftp

# Modo passivo (necessário para Docker/NAT)
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
pasv_addr_resolve=YES
pasv_address=0.0.0.0

# Banner de boas-vindas — easter egg UnBreakable
ftpd_banner=[ UnBreakable Training Env ] DETIC/UnB Homologacao

# Segurança
no_anon_password=YES
hide_ids=YES
seccomp_sandbox=NO
