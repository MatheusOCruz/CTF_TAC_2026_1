services:
  unb-web:
    build:
      context: ./unb-web
      args:
        TI_UNB_PASS: "t1_unb_2023"
    container_name: unb-web
    ports:
      - "80:80"
      - "2222:22"
    restart: unless-stopped

  unb-ftp:
    build:
      context: ./unb-ftp
    container_name: unb-ftp
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    restart: unless-stopped
