DefaultRuntimeDir ${APACHE_RUN_DIR}
PidFile ${APACHE_PID_FILE}
Timeout 300
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

User ${APACHE_RUN_USER}
Group ${APACHE_RUN_GROUP}

HostnameLookups Off

ErrorLog ${APACHE_LOG_DIR}/error.log
LogLevel warn

ServerName localhost

# Encoding padrão UTF-8 para todos os arquivos servidos
AddDefaultCharset UTF-8



# Carrega módulos e configs habilitados
IncludeOptional mods-enabled/*.load
IncludeOptional mods-enabled/*.conf
Include ports.conf

# Raiz do sistema de arquivos — nega tudo por padrão
<Directory />
    Options FollowSymLinks
    AllowOverride None
    Require all denied
</Directory>

# Document root — SEM directory listing (boa prática)
<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.html index.php
    # Easter Eggs UnBreakable — visíveis a quem inspecionar as respostas HTTP
    <IfModule mod_headers.c>
        Header always set X-Powered-By "UnBreakable Project - Try Harder!"
        Header always set X-Flag-Hint "VGhlIGFuc3dlciBsaWVzIGluIHRoZSBkYXRhYmFzZQ=="
    </IfModule>
</Directory>

# Misconfiguration INTENCIONAL — directory listing em /backup/
<Directory /var/www/html/backup>
    Options +Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# Página de erro customizada — easter egg UnBreakable
ErrorDocument 404 /errors/404.html

# Protege arquivos .htaccess
AccessFileName .htaccess
<FilesMatch "^\.ht">
    Require all denied
</FilesMatch>

# Formatos de log
LogFormat "%v:%p %h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" vhost_combined
LogFormat "%h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined
LogFormat "%h %l %u %t \"%r\" %>s %O" common
LogFormat "%{Referer}i -> %U" referer
LogFormat "%{User-agent}i" agent

# Inclui configurações adicionais e sites habilitados
IncludeOptional conf-enabled/*.conf
IncludeOptional sites-enabled/*.conf
