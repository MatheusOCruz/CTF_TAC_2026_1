server {
    listen 80 default_server;
    server_name _;
    return 301 http://repo;
}

server {
    listen 80;
    server_name repo;

    location / {
        root /var/www/html/;
        index index.html;
    }

    # Alimenta css/js corretamente
    location ~ \.(css|js)$ {
        root /var/www/html/;
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Checa, via backend, se o cookie de sessão (httpOnly) é válido.
    # "back" é o hostname do serviço definido no docker-compose.
    location = /auth-verify {
        internal;
        proxy_pass http://back:3000/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    # Páginas que só podem ser acessadas após login bem-sucedido
    location ~ ^/(repo_bureau/apex|repo_bureau/ilove|repo_bureau/ship|repo_bureau/note7)(/|$) {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        root /var/www/html;
    }

    location @unauthorized {
        return 302 /login/login.html;
    }

    # Potions só pode ser acessado via academy.repo, nunca direto por aqui.
    location ^~ /potions/ {
        return 404;
    }

    # Configuração individual dos diretórios
    location ^~ /extractor/ {
        root /var/www/html/;
        index extractor.html;
    }
    location ^~ /landing/ {
        root /var/www/html/;
        index landing.html;
    }
    location ^~ /login/ {
        root /var/www/html/;
        index login.html;
    }
    location ^~ /loot/ {
        root /var/www/html/;
        index loot.html;
    }
    location ^~ /store/ {
        root /var/www/html/;
        index store.html;
    }
    # Só acessível com sessão válida (chegou aqui depois de logar de verdade).
    location ^~ /success/ {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        root /var/www/html/;
        index success.html;
    }
    location ^~ /tax/ {
        root /var/www/html/;
        index tax.html;
    }
}

server {
    listen 80;
    server_name academy.repo;

    # Checa, via backend, se o cookie de sessão (httpOnly) é válido.
    # "back" é o hostname do serviço definido no docker-compose.
    location = /auth-verify {
        internal;
        proxy_pass http://back:3000/api/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }

    location @unauthorized {
        return 302 http://repo/login/login.html;
    }

    # Página de handoff: troca o token vindo de repo por um cookie próprio
    # daqui. Não pode exigir auth_request, senão ninguém chega nela pra logar.
    location = /bridge.html {
        root /var/www/html/potions;
    }

    # Todo o academy.repo (incluindo a página de potions) exige login.
    location / {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        root /var/www/html/potions;
        index potions.html;
    }

    # location ^~ tem prioridade sobre location ~ (regex), então o auth_request
    # precisa estar dentro de cada bloco de prefixo abaixo, não num bloco de regex separado.
    location ^~ /repo_bureau/apex/ {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        root /var/www/html/;
        index apex.html;
    }
    location ^~ /repo_bureau/ilove/ {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        root /var/www/html/;
        index ilove.html;
    }
    location ^~ /repo_bureau/note7/ {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        root /var/www/html/;
        index note7.gif;
    }
    location ^~ /repo_bureau/ship/ {
        auth_request /auth-verify;
        error_page 401 = @unauthorized;
        root /var/www/html/;
        index ship.html;
    }
}