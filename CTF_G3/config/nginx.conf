server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

	add_header X-Powered-By "PHP/7.4 Laravel/8" always;

    # Rota principal do Laravel
    location / {
		try_files $uri $uri/ /index.php?$query_string;
    }

    # Processa PHP via php-fpm
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ─────────────────────────────────────────────────────────────
    # VULNERABILIDADE INTENCIONAL (CVE-2024-29291)
    # Expõe o diretório storage/logs publicamente.
    # Em uma instalação Laravel correta, storage/ NUNCA ficaria
    # dentro de public/ nem seria servido diretamente pelo nginx.
    # Aqui simulamos um sysadmin que configurou errado o servidor.
    # ─────────────────────────────────────────────────────────────
    location /storage/ {
        alias /var/www/html/storage/;
        autoindex on;
    }

    # Nega acesso a arquivos ocultos (.env, .git, etc)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
