# vsftpd.conf — Abstergo Industries FTP Server
# Login anonimo habilitado (vulnerabilidade intencional para CTF)

listen=YES
listen_ipv6=NO

# Permitir login anonimo sem senha
anonymous_enable=YES
no_anon_password=YES
anon_root=/var/ftp

# Desabilitar login local e escrita
local_enable=NO
write_enable=NO
anon_upload_enable=NO
anon_mkdir_write_enable=NO

# Configurações gerais
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES

# Modo passivo habilitado (simplifica uso em ambiente local)
pasv_enable=YES

# Banner temático
ftpd_banner=Abstergo Industries - Animus Legacy File Transfer System
