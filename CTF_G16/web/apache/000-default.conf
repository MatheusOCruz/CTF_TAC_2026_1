<VirtualHost *:80>
    ServerName desaprender3.unb.local
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # VULN (info disclosure): listagem de diretório habilitada em /backup
    # -> expõe o dump de usuários com hashes MD5.
    <Directory /var/www/html/backup>
        Options +Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
