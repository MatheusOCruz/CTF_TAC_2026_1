services:
  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: apreder4
      POSTGRES_PASSWORD: apreder4_secret
      POSTGRES_DB: apreder4
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apreder4"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      DATABASE_URL: "postgresql://apreder4:apreder4_secret@db:5432/apreder4"
      JWT_SECRET: "super_secret_jwt_key_change_in_prod"
    ports:
      - "80:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
