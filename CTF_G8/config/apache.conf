<VirtualHost *:80>
    ServerAdmin alcina@castle-dimitrescu.local
    DocumentRoot /var/www/html
    ServerName castle-dimitrescu.local
    ErrorDocument 403 /forbidden.html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Galeria de retratos - listagem permitida
    <Directory /var/www/html/portraits>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Área restrita - acesso bloqueado
    <Directory /var/www/html/blood_cellar>
        Options None
        AllowOverride None
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
