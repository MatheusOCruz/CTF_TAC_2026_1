listen=YES
listen_ipv6=NO

# Anonymous access is disabled - authenticated local users only.
anonymous_enable=NO
local_enable=YES
write_enable=NO

# Keep users chrooted to their home directory.
chroot_local_user=YES
allow_writeable_chroot=YES

dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES

# Passive mode range (matches the ports published in docker-compose.yml)
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110

seccomp_sandbox=NO
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd
