# Default site: any host / bare IP gets the maintenance holding page.
<VirtualHost *:80>
    ServerName _default_
    DocumentRoot /var/www/maintenance

    <Directory /var/www/maintenance>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/maintenance_error.log
    CustomLog ${APACHE_LOG_DIR}/maintenance_access.log combined
</VirtualHost>

# The real portal: only served when the Host header is chessmaster.local.
<VirtualHost *:80>
    ServerName chessmaster.local
    DocumentRoot /var/www/chessmaster

    <Directory /var/www/chessmaster>
        Options -Indexes
        AllowOverride None
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Leftover migration export - autoindex left on by mistake.
    <Directory /var/www/chessmaster/backup>
        Options +Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/chessmaster_error.log
    CustomLog ${APACHE_LOG_DIR}/chessmaster_access.log combined
</VirtualHost>
